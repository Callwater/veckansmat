<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#059669">
    <title>Gemensam Veckomeny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-out-item { opacity: 0; height: 0; margin: 0; padding: 0; transform: translateX(20px); transition: all 0.5s ease-in-out; }
        
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #059669; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Drag & Drop Styles */
        .drag-card { cursor: grab; touch-action: none; user-select: none; transition: transform 0.2s, box-shadow 0.2s; }
        .drag-card:active { cursor: grabbing; }
        .drag-over { background-color: #ecfdf5 !important; border: 2px dashed #059669 !important; transform: scale(1.02); z-index: 10; }
        .dragging { opacity: 0.4; }

        /* Lock Styles */
        .locked-card { border-left-color: #ef4444 !important; background-color: #fef2f2; }
        .locked-icon { color: #ef4444; }

        /* Chips for Basvaror */
        .chip { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 9999px; background-color: #e5e7eb; font-size: 0.75rem; margin: 2px; }
        .chip button { margin-left: 4px; color: #6b7280; }
        .chip button:hover { color: #ef4444; }

        @media print {
            header, #tab-nav, .no-print, #toast, #connection-status, button, input, select, textarea, #data-settings, #hidden-items-info, .fa-pen, .fa-trash, .print-hidden, #school-check-container, .edit-cat-icon { display: none !important; }
            body, main { height: auto !important; overflow: visible !important; background-color: white !important; color: black !important; padding: 0 !important; margin: 0 !important; display: block !important; }
            #print-header { display: block !important; text-align: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #059669; }
            .w-full.max-w-md { max-width: 100% !important; width: 100% !important; }
            #menu-result > div { border: 1px solid #ddd !important; box-shadow: none !important; page-break-inside: avoid; margin-bottom: 10px !important; background: white !important; }
            #shopping-list-container { border: 1px solid #ddd !important; background: white !important; page-break-inside: avoid; box-shadow: none !important; }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 h-screen flex flex-col overflow-hidden">

    <div id="print-header" class="hidden text-2xl font-bold pt-4">VECKANS MATSEDEL</div>

    <header class="bg-emerald-600 text-white p-4 shadow-md flex-none z-20 flex justify-between items-center no-print">
        <h1 class="text-lg font-bold flex items-center"><i class="fas fa-home mr-2"></i> <span id="room-header-name">Veckomeny</span></h1>
        <div id="connection-status" class="text-xs bg-emerald-700 px-2 py-1 rounded flex items-center gap-1">
            <div class="loader"></div> Ansluter...
        </div>
    </header>

    <div id="tab-nav" class="bg-white shadow z-10 flex-none no-print">
        <div class="flex max-w-md mx-auto">
            <button onclick="window.showTab('menu')" id="tab-menu" class="flex-1 py-3 text-center text-sm bg-emerald-50 font-semibold border-b-4 border-emerald-600 text-emerald-700 transition"><i class="fas fa-calendar-alt block mb-1 text-lg"></i> Meny</button>
            <button onclick="window.showTab('add')" id="tab-add" class="flex-1 py-3 text-center text-sm text-gray-500 border-b-4 border-transparent hover:bg-gray-50 transition"><i class="fas fa-plus-circle block mb-1 text-lg"></i> Hantera</button>
            <button onclick="window.showTab('list')" id="tab-list" class="flex-1 py-3 text-center text-sm text-gray-500 border-b-4 border-transparent hover:bg-gray-50 transition"><i class="fas fa-list block mb-1 text-lg"></i> Alla</button>
            <button onclick="window.showTab('settings')" id="tab-settings" class="flex-1 py-3 text-center text-sm text-gray-500 border-b-4 border-transparent hover:bg-gray-50 transition"><i class="fas fa-cog block mb-1 text-lg"></i> Inställn.</button>
        </div>
    </div>

    <main class="flex-grow overflow-y-auto p-4 pb-24 bg-gray-100 w-full flex justify-center">
        <div class="w-full max-w-md">

            <div id="view-menu" class="fade-in">
                <div id="generate-container" class="bg-white p-5 rounded-xl shadow-sm text-center mb-6 no-print border-t-4 border-emerald-500">
                    <p class="text-gray-600 mb-4 text-sm font-medium">Slumpa fram menyn för rummet.</p>
                    <button onclick="window.generateMenu()" class="w-full bg-emerald-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg hover:bg-emerald-700 transition transform active:scale-95">
                        <i class="fas fa-magic mr-2"></i> Slumpa Veckomeny
                    </button>
                    <p class="text-[10px] text-gray-400 mt-3 italic">Dagar med <i class="fas fa-lock text-red-400"></i> ändras inte.</p>
                    
                    <div id="school-check-container" class="border-t mt-4 pt-4">
                        <button id="clash-btn" onclick="window.checkMateoClash()" class="w-full bg-yellow-100 text-yellow-800 font-bold py-3 px-4 rounded-xl shadow-sm border border-yellow-300 hover:bg-yellow-200 transition">
                            <i class="fas fa-exclamation-triangle mr-2"></i> Kolla Skolkrockar
                        </button>
                    </div>
                </div>
                
                <div id="print-btn-container" class="hidden mb-4 flex justify-between items-center no-print bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                   <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Din matsatsedel</span>
                   <button onclick="window.print()" class="text-xs bg-gray-100 text-gray-600 px-3 py-2 rounded-lg font-bold border hover:bg-gray-200">
                        <i class="fas fa-print mr-1"></i> Skriv ut
                    </button>
                </div>

                <div id="menu-result" class="hidden space-y-4"></div>
                
                <p id="drag-hint" class="hidden text-center text-[10px] text-gray-400 mt-4 no-print italic">Dra och släpp för att flytta dagar.</p>

                <div id="shopping-list-container" class="hidden mt-8 bg-yellow-50 border border-yellow-200 p-5 rounded-2xl shadow-sm mb-8">
                    <div class="flex justify-between items-center mb-4 border-b border-yellow-200 pb-2">
                        <h3 class="font-bold text-lg text-yellow-800">Handlingslista</h3>
                        <button onclick="window.copyShoppingList()" class="text-yellow-800 bg-yellow-200 px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-tighter shadow-sm no-print">Kopiera</button>
                    </div>
                    <div id="hidden-items-info" class="hidden bg-yellow-100 text-yellow-800 text-[10px] p-2 rounded-lg mb-3 flex justify-between items-center cursor-pointer no-print" onclick="window.showHiddenItems()">
                        <span><i class="fas fa-check-circle mr-1"></i> <span id="hidden-count">0</span> varor klara</span> <span class="font-bold underline uppercase">Visa</span>
                    </div>
                    <div id="shopping-list-content" class="text-sm text-gray-700 space-y-4"></div>
                </div>
            </div>

            <div id="view-add" class="hidden fade-in">
                <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border-t-4 border-blue-500">
                    <div class="flex justify-between items-center mb-6">
                        <h2 id="form-title" class="text-xl font-bold text-gray-800">Ny maträtt</h2>
                        <button id="cancel-edit-btn" onclick="window.resetForm()" class="hidden text-xs text-red-500 font-bold uppercase tracking-widest">Avbryt</button>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Namn</label>
                            <input type="text" id="new-name" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="T.ex. Köttbullar & mos">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Kategori</label>
                            <select id="new-category" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
                                <option value="kött">Kött</option><option value="kyckling">Kyckling</option><option value="chark">Chark/Korv</option>
                                <option value="fisk">Fisk</option><option value="vegetarisk">Vegetariskt</option><option value="helg">Helg/Lyx</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Ingredienser</label>
                            <textarea id="new-ingredients" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl h-24 outline-none" placeholder="Lök, Grädde, Köttfärs..."></textarea>
                        </div>
                        <button id="save-btn" onclick="window.handleSaveDish()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition transform active:scale-95">Spara Recept</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 no-print">
                    <button onclick="window.openImportModal()" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
                        <i class="fas fa-link text-indigo-500 block mb-2 text-xl"></i>
                        <span class="text-[10px] font-bold uppercase text-gray-500">Hämta från URL</span>
                    </button>
                    <button onclick="window.openBasvarorModal()" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
                        <i class="fas fa-box-open text-amber-500 block mb-2 text-xl"></i>
                        <span class="text-[10px] font-bold uppercase text-gray-500">Basvaror</span>
                    </button>
                </div>
            </div>

            <div id="view-list" class="hidden fade-in">
                <div class="bg-white p-4 rounded-2xl shadow-sm mb-4 sticky top-0 z-10 border border-gray-100">
                    <input type="text" id="search-input" onkeyup="window.filterDishes()" placeholder="Sök bland sparade recept..." class="w-full p-2 bg-gray-50 rounded-lg text-sm outline-none border border-gray-100">
                </div>
                <div id="all-dishes-list" class="space-y-3 pb-8"></div>
            </div>

            <div id="view-settings" class="hidden fade-in">
                <div class="bg-white p-6 rounded-2xl shadow-sm mb-4 border border-gray-100">
                    <h3 class="font-bold text-gray-800 mb-4 uppercase text-xs tracking-widest">Backup & Data</h3>
                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="window.exportDishes()" class="w-full text-left p-4 bg-gray-50 rounded-xl flex justify-between items-center hover:bg-gray-100">
                            <span class="text-sm font-medium">Spara backup (Fil)</span>
                            <i class="fas fa-download text-gray-400"></i>
                        </button>
                        <button onclick="document.getElementById('import-file').click()" class="w-full text-left p-4 bg-gray-50 rounded-xl flex justify-between items-center hover:bg-gray-100">
                            <span class="text-sm font-medium">Ladda upp backup</span>
                            <i class="fas fa-upload text-gray-400"></i>
                        </button>
                    </div>
                    <input type="file" id="import-file" class="hidden" accept=".json" onchange="window.importDishes(this)">
                </div>
                
                <div class="p-6 text-center">
                    <p class="text-[10px] text-gray-400">Rum: <span class="font-bold text-emerald-600" id="room-id-display">standard</span></p>
                    <p class="text-[10px] text-gray-300 mt-1">v2.0 Room Sync Edition</p>
                </div>
            </div>
        </div>
    </main>

    <div id="basvaror-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl relative flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold">Basvaror</h3>
                <button onclick="window.closeBasvarorModal()" class="text-gray-400"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex gap-2 mb-4">
                <input type="text" id="new-basvara" class="flex-grow p-2 bg-gray-50 border rounded-lg text-sm outline-none" placeholder="Lägg till basvara..." onkeydown="if(event.key==='Enter') window.addBasvara()">
                <button onclick="window.addBasvara()" class="bg-emerald-600 text-white px-4 rounded-lg"><i class="fas fa-plus"></i></button>
            </div>
            <div id="basvaror-list" class="flex-grow overflow-y-auto flex flex-wrap gap-1 p-2 bg-gray-50 rounded-xl border border-dashed"></div>
        </div>
    </div>

    <div id="category-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4">Flytta vara</h3>
            <select id="cat-edit-select" class="w-full p-4 bg-gray-50 border rounded-xl mb-6 outline-none"></select>
            <div class="flex gap-3">
                <button onclick="document.getElementById('category-modal').classList.add('hidden')" class="flex-1 py-3 text-sm font-bold text-gray-400">Avbryt</button>
                <button onclick="window.saveCategoryChange()" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-lg">Spara</button>
            </div>
        </div>
    </div>

    <div id="select-dish-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold" id="select-dish-title">Välj rätt</h3>
                <button onclick="window.closeSelectDishModal()" class="text-gray-400"><i class="fas fa-times"></i></button>
            </div>
            <input type="text" id="select-modal-search" onkeyup="window.filterSelectModal()" placeholder="Sök..." class="w-full p-3 bg-gray-50 rounded-xl text-sm mb-4 outline-none border">
            <div id="select-dish-list" class="flex-grow overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900/90 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-[100] text-sm font-bold"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // --- KONFIGURATION OCH RUMS-LOGIK ---
        const firebaseConfig = {
            apiKey: "AIzaSyA4tVwDuLbDIRTt6O9gnghpJRBOXjD6fI0",
            authDomain: "veckansmat-3ed6b.firebaseapp.com",
            projectId: "veckansmat-3ed6b",
            storageBucket: "veckansmat-3ed6b.firebasestorage.app",
            messagingSenderId: "199515297394",
            appId: "1:199515297394:web:d071866da9add8338954eb",
            measurementId: "G-01R2YNNJ8V"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const currentRoom = urlParams.get('rum') || 'standard';

        // Dynamiska sökvägar baserat på rummet
        const RECEPT_PATH = `rum/${currentRoom}/recept`;
        const SETTINGS_COLLECTION = `rum/${currentRoom}/installningar`;
        const SETTINGS_DOC = "basvaror";
        const CATEGORIES_DOC = "kategorier";
        const MENU_DOC = "current-menu";
        const GLOBAL_SETTINGS_PATH = "globala_installningar";
        const BASVAROR_DOC_NAME = "basvaror";

        // Variabler
        let dishes = [];
        let basvarorSet = new Set(['salt', 'peppar', 'svartpeppar', 'vitpeppar', 'olja', 'olivolja', 'rapsolja', 'mjöl', 
                                   'vetemjöl', 'ströbröd', 'ris', 'pasta', 'spaghetti', 'makaroner', 'potatis', 'lök', 
                                   'gullök', 'rödlök', 'vitlök', 'ägg', 'krossade tomater', 'tomatpuré', 'buljong', 'grönsaksbuljong', 
                                   'köttbuljong', 'kycklingbuljong', 'socker', 'soja', 'ketchup', 'senap', 'vinäger', 'dill', 'persilja', 
                                   'oregano', 'timjan', 'paprikapulver', 'curry', 'sambal oelek', 'smör', 'mjölk']);
        let customCategories = {};
        let editingId = null;
        window.currentMenu = {};
        window.lockedDays = new Set();
        window.detectedClashes = {};

        window.populateClassicBasvaror = async () => {
    const klassiskaVaror = [
        'salt', 'peppar', 'socker', 'vetemjöl', 'rapsolja', 'olivolja', 
        'smör', 'ägg', 'mjölk', 'pasta', 'ris', 'potatis', 
        'gul lök', 'röd lök', 'vitlök', 'krossade tomater', 'tomatpuré', 
        'buljongtärningar', 'ketchup', 'senap', 'soja', 'bakpulver', 
        'vaniljsocker', 'jäst', 'havregryn', 'ströbröd', 'kakao', 'vinäger'
    ];

    if(confirm("Vill du skriva över den globala listan med klassiska basvaror?")) {
        basvarorSet = new Set(klassiskaVaror);
        await saveBasvarorToCloud();
        showToast("Globala basvaror skapade!");
    }
};

        // Uppdatera UI med rumsnamn
        document.getElementById('room-header-name').innerText = currentRoom;
        document.getElementById('room-id-display').innerText = currentRoom;

        // --- FIREBASE LYSSNARE ---

        // 1. Lyssna på Recept
        onSnapshot(collection(db, RECEPT_PATH), (s) => {
            dishes = s.docs.map(doc => ({ 
                id: doc.id, 
                ...doc.data(),
                // Se till att ingredienser alltid är en Array även om de sparades som String förr
                ingredients: Array.isArray(doc.data().ingredients) ? doc.data().ingredients : 
                            (doc.data().ingredienser ? (Array.isArray(doc.data().ingredienser) ? doc.data().ingredienser : doc.data().ingredienser.split(',').map(i=>i.trim())) : [])
            }));
            document.getElementById('connection-status').innerHTML = '<i class="fas fa-wifi text-green-300"></i> Online';
            renderDishList();
        });

        // 2. Lyssna på Veckomenyn
        onSnapshot(doc(db, SETTINGS_COLLECTION, MENU_DOC), (docSnap) => {
            if (docSnap.exists()) {
                window.currentMenu = docSnap.data();
                window.renderMenuUI();
            }
        });

        // 3. Lyssna på Basvaror
// Lyssna på den GLOBALA listan
onSnapshot(doc(db, GLOBAL_SETTINGS_PATH, BASVAROR_DOC_NAME), (docSnap) => {
    if (docSnap.exists() && docSnap.data().items) {
        // Uppdatera den lokala listan med den gemensamma datan
        basvarorSet = new Set(docSnap.data().items.map(i => i.toLowerCase()));
        if (window.renderBasvarorList) renderBasvarorList();
    }
});

        // 4. Lyssna på Kategorier
        onSnapshot(doc(db, SETTINGS_COLLECTION, CATEGORIES_DOC), (docSnap) => {
            if (docSnap.exists()) {
                customCategories = docSnap.data().map || {};
            }
        });

        // --- APP LOGIK (RUMS-ANPASSAD) ---

        window.handleSaveDish = async () => {
            const name = document.getElementById('new-name').value.trim();
            const cat = document.getElementById('new-category').value;
            const ingStr = document.getElementById('new-ingredients').value.trim();
            
            if (!name) return showToast("Ge rätten ett namn!");

            // Gör om texten till en lista
            const ings = ingStr.split(',').map(i => i.trim()).filter(i => i !== "");

            try {
                if(editingId) {
                    await updateDoc(doc(db, RECEPT_PATH, editingId), { title: name, ingredients: ings, kategori: cat });
                    showToast("Ändring sparad!");
                } else {
                    await addDoc(collection(db, RECEPT_PATH), { title: name, ingredients: ings, kategori: cat, createdAt: new Date().toISOString() });
                    showToast("Sparat i rummet!");
                }
                window.resetForm();
            } catch(e) {
                console.error(e);
                showToast("Kunde inte spara.");
            }
        };

        window.deleteDish = async (id) => {
            if(!confirm("Vill du ta bort receptet från rummet?")) return;
            try {
                await deleteDoc(doc(db, RECEPT_PATH, id));
                showToast("Borttaget.");
            } catch(e) { console.error(e); }
        };

        window.generateMenu = async () => {
            const days = ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag', 'Söndag'];
            const daysToFill = days.filter(d => !window.lockedDays.has(d));
            
            if (dishes.length < daysToFill.length) return showToast("Du behöver fler recept för att slumpa!");

            const newMenu = { ...window.currentMenu };
            let pool = [...dishes].sort(() => 0.5 - Math.random());

            daysToFill.forEach(day => {
                const winner = pool.pop();
                if(winner) {
                    newMenu[day] = {
                        id: winner.id,
                        namn: winner.title,
                        ingredienser: winner.ingredients,
                        kategori: winner.kategori
                    };
                }
            });

            window.currentMenu = newMenu;
            
            // SPARA TILL RUMMET I FIREBASE
            try {
                await setDoc(doc(db, SETTINGS_COLLECTION, MENU_DOC), window.currentMenu);
                window.renderMenuUI();
                showToast("Ny meny sparad för alla!");
            } catch(e) { console.error(e); }
        };

        // --- RENDERING (REALTID) ---

function renderDishList() {
            const el = document.getElementById('all-dishes-list');
            if(!el) return;
            el.innerHTML = '';

            // Sortera alfabetiskt (hanterar både title och namn för säkerhets skull)
            const sorted = [...dishes].sort((a, b) => {
                const nameA = a.title || a.namn || "";
                const nameB = b.title || b.namn || "";
                return nameA.localeCompare(nameB, 'sv');
            });

            sorted.forEach(d => {
                el.innerHTML += `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center fade-in">
                    <div>
                        <h3 class="font-bold text-gray-800">${d.title || d.namn || 'Namnlös'}</h3>
                        <p class="text-[10px] text-gray-400 line-clamp-1">${(d.ingredients || []).join(', ')}</p>
                        <span class="text-[9px] uppercase font-bold text-blue-500 mt-1 block">${d.kategori || 'övrigt'}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.editDish('${d.id}')" class="p-2 text-gray-300 hover:text-blue-500"><i class="fas fa-pen"></i></button>

                    </div>
                </div>`;
            });
        }

        window.renderMenuUI = () => {
            const resEl = document.getElementById('menu-result');
            if(!resEl) return;
            resEl.innerHTML = ''; resEl.classList.remove('hidden');
            
            const days = ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag', 'Söndag'];
            
            days.forEach(day => {
                const d = window.currentMenu[day];
                const isLocked = window.lockedDays.has(day);
                const hasClash = window.detectedClashes[day];
                
                resEl.innerHTML += `
                <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 ${isLocked ? 'border-red-400 bg-red-50/30' : 'border-emerald-500'} relative">
                    ${hasClash ? '<div class="absolute -top-2 right-10 bg-red-500 text-white text-[8px] px-2 py-0.5 rounded-full font-bold animate-bounce">SKOLKROCK</div>' : ''}
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[10px] font-black uppercase text-gray-400 tracking-tighter">${day}</span>
                        <div class="flex gap-3 no-print">
                            <button onclick="window.toggleLock('${day}')" class="${isLocked ? 'text-red-500' : 'text-gray-200'}"><i class="fas fa-lock${!isLocked ? '-open' : ''}"></i></button>
                            <button onclick="window.openSelectDishModal('${day}')" class="text-gray-200 hover:text-emerald-500"><i class="fas fa-sync"></i></button>
                        </div>
                    </div>
                    <div class="font-bold text-gray-800">${d ? d.namn : '<span class="text-gray-300">Inget valt</span>'}</div>
                    <div class="text-[11px] text-gray-500 italic mt-1">${d ? (d.ingredienser || []).join(', ') : ''}</div>
                </div>`;
            });

            if(Object.keys(window.currentMenu).length > 0) {
                document.getElementById('shopping-list-container').classList.remove('hidden');
                document.getElementById('print-btn-container').classList.remove('hidden');
                generateShoppingList();
            }
        };

        // --- SHOPPING LIST LOGIC ---

        function generateShoppingList() {
            const container = document.getElementById('shopping-list-content');
            let allIngs = [];
            
            Object.values(window.currentMenu).forEach(ratt => {
                if(ratt && ratt.ingredienser) allIngs = allIngs.concat(ratt.ingredienser);
            });

            // Gruppera unika varor
            const unique = [...new Set(allIngs.map(i => i.toLowerCase().trim()))];
            const cats = {};
            const bas = [];

            unique.forEach(i => {
                if(basvarorSet.has(i)) bas.push(i);
                else {
                    const cat = categorizeIngredient(i);
                    if(!cats[cat]) cats[cat] = [];
                    cats[cat].push(i);
                }
            });

            container.innerHTML = '';

            // Rita ut per kategori
            Object.keys(cats).sort().forEach(cat => {
                container.innerHTML += `<div class="text-[10px] font-bold text-emerald-700 uppercase mb-1 mt-4">${cat}</div>`;
                cats[cat].sort().forEach(item => {
                    container.innerHTML += `
                    <div class="flex items-center gap-3 py-1 border-b border-yellow-100">
                        <input type="checkbox" onchange="window.handleCheck(this)" class="w-5 h-5 rounded border-yellow-300">
                        <span class="capitalize text-gray-700" onclick="window.openCategoryModal('${item}')">${item}</span>
                    </div>`;
                });
            });

            if(bas.length > 0) {
                container.innerHTML += `<div class="text-[10px] font-bold text-gray-400 uppercase mb-1 mt-6">Basvaror (Kolla hemma)</div>`;
                bas.sort().forEach(item => {
                    container.innerHTML += `
                    <div class="flex items-center gap-3 py-1 opacity-60">
                        <input type="checkbox" onchange="window.handleCheck(this)" class="w-4 h-4 rounded">
                        <span class="text-xs text-gray-500 capitalize">${item}</span>
                    </div>`;
                });
            }
        }

        // Hjälpfunktioner för kategorisering
        const CATEGORY_KEYWORDS = { 
            'Grönt': ['tomat','gurka','lök','paprika','morot','sallad','kål','broccoli','citron','vitlök','chili','potatis'],
            'Mejeri': ['mjölk','grädde','ost','smör','ägg','fraiche','yoghurt','feta','halloumi'],
            'Kött/Fisk': ['lax','torsk','kyckling','färs','bacon','skinka','korv','falukorv','biff','räkor'],
            'Skafferi': ['pasta','ris','mjöl','socker','krossade','puré','olja','vinäger','buljong','soja','taco','chips','nudlar']
        };

        function categorizeIngredient(ing) {
            if(customCategories[ing]) return customCategories[ing];
            for (const [cat, keys] of Object.entries(CATEGORY_KEYWORDS)) {
                if(keys.some(k => ing.includes(k))) return cat;
            }
            return 'Övrigt';
        }

        // --- GLOBAL WINDOW FUNCTIONS ---
        window.showTab = (t) => {
            ['menu','add','list','settings'].forEach(x => {
                document.getElementById('view-'+x).classList.add('hidden');
                document.getElementById('tab-'+x).className = "flex-1 py-3 text-center text-sm text-gray-500 border-b-4 border-transparent transition";
            });
            document.getElementById('view-'+t).classList.remove('hidden');
            document.getElementById('tab-'+t).className = "flex-1 py-3 text-center text-sm bg-emerald-50 font-semibold border-b-4 border-emerald-600 text-emerald-700 transition";
        };

        window.toggleLock = (day) => {
            if(window.lockedDays.has(day)) window.lockedDays.delete(day);
            else window.lockedDays.add(day);
            window.renderMenuUI();
        };

        window.editDish = (id) => {
            const d = dishes.find(x => x.id === id);
            if(!d) return;
            editingId = id;
            document.getElementById('new-name').value = d.title;
            document.getElementById('new-category').value = d.kategori || 'kött';
            document.getElementById('new-ingredients').value = (d.ingredients || []).join(', ');
            document.getElementById('form-title').innerText = "Redigera recept";
            document.getElementById('save-btn').innerText = "Spara ändringar";
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            window.showTab('add');
        };

        window.resetForm = () => {
            editingId = null;
            document.getElementById('new-name').value = '';
            document.getElementById('new-ingredients').value = '';
            document.getElementById('form-title').innerText = "Ny maträtt";
            document.getElementById('save-btn').innerText = "Spara Recept";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        };

        window.handleCheck = (cb) => {
            const span = cb.nextElementSibling;
            if(cb.checked) {
                span.classList.add('line-through', 'opacity-30');
                hiddenItemsCount++;
            } else {
                span.classList.remove('line-through', 'opacity-30');
                hiddenItemsCount--;
            }
            updateHiddenUI();
        };

        let hiddenItemsCount = 0;
        function updateHiddenUI() {
            const el = document.getElementById('hidden-items-info');
            if(hiddenItemsCount > 0) {
                el.classList.remove('hidden');
                document.getElementById('hidden-count').innerText = hiddenItemsCount;
            } else el.classList.add('hidden');
        }

        window.showHiddenItems = () => {
            document.querySelectorAll('#shopping-list-content input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
                cb.nextElementSibling.classList.remove('line-through', 'opacity-30');
            });
            hiddenItemsCount = 0;
            updateHiddenUI();
        };

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 2500);
        }

        window.copyShoppingList = () => {
            const lines = ["VECKANS HANDLING:"];
            document.querySelectorAll('#shopping-list-content div').forEach(div => {
                const text = div.innerText.trim();
                if(text && !div.querySelector('input')?.checked) {
                    if(div.classList.contains('font-bold')) lines.push(`\n[${text}]`);
                    else lines.push("- " + text);
                }
            });
            navigator.clipboard.writeText(lines.join('\n'));
            showToast("Lista kopierad!");
        };

        window.openBasvarorModal = () => {
            document.getElementById('basvaror-modal').classList.remove('hidden');
            renderBasvarorList();
        };
        window.closeBasvarorModal = () => document.getElementById('basvaror-modal').classList.add('hidden');
        
        function renderBasvarorList() {
            const el = document.getElementById('basvaror-list');
            el.innerHTML = [...basvarorSet].sort().map(v => `
                <div class="chip capitalize">${v}<button onclick="window.removeBasvara('${v}')">&times;</button></div>
            `).join('');
        }

        // Sparar till den gemensamma mappen
async function saveBasvarorToCloud() {

        // --- KOPIERA OCH ERSÄTT DIN BEFINTLIGA addBasvara ---
window.addBasvara = async () => {
    const input = document.getElementById('new-basvara');
    if (!input) return;
    
    const nyVara = input.value.trim().toLowerCase();
    
    if (nyVara === "") {
        showToast("Skriv in något först!");
        return;
    }

    // 1. Lägg till i den lokala listan (Set)

    // 2. Töm fältet direkt för bättre känsla

    // 3. Spara till den GLOBALA mappen
    try {
        const globalDocRef = doc(db, "globala_installningar", "basvaror");

            items: Array.from(basvarorSet) 
        });
        showToast(`"${nyVara}" tillagd för alla hem!`);

        console.error("Firebase stoppade dig:", error);
        // Om du ser detta i konsolen (F12) är det dina Rules som spökar
        showToast("Fel: Du har inte tillåtelse att ändra basvaror.");
    }
};

         //   if(!v) return;
         //   basvarorSet.add(v);
          //  document.getElementById('new-basvara').value = '';

         //   await setDoc(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), { items: [...basvarorSet] });

        window.removeBasvara = async (v) => {
            basvarorSet.delete(v);
            renderBasvarorList();
            await setDoc(doc(db, SETTINGS_COLLECTION, SETTINGS_DOC), { items: [...basvarorSet] });
        };

        // Skolmat-krock-funktion (behåll din befintliga logik men koppla till nya UI:t)
window.checkMateoClash = async () => {
            const btn = document.getElementById('clash-btn');
            const originalText = btn ? btn.innerHTML : '';
            if(btn) { btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Kollar krockar...'; btn.disabled = true; }
            
            try {
                window.detectedClashes = {}; 
                const today = new Date();
                const dayOfWeek = today.getDay();
                
                let monday = new Date(today);
                if (dayOfWeek === 6) monday.setDate(today.getDate() + 2);
                else if (dayOfWeek === 0) monday.setDate(today.getDate() + 1);
                else monday.setDate(today.getDate() - (dayOfWeek - 1));
                
                const getYMD = (d) => d.toISOString().split('T')[0];
                const fromDate = getYMD(monday);
                const friday = new Date(monday); 
                friday.setDate(monday.getDate() + 4);
                const toDate = getYMD(friday);

                const targetUrl = `https://meny-api.mateo.se/api/v1/days/565?from=${fromDate}&to=${toDate}`;
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

                const res = await fetch(proxyUrl);
                const json = await res.json();
                const rawMeals = json.data || json;
                const vardagar = ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag'];
                let krockCount = 0;

                // --- SMARTA KROCK-GRUPPER ---
                // Om ETT ord från listan finns i din mat OCH ett ord finns i skolmaten = KROCK
                const KROCK_GRUPPER = [
                    { namn: 'Fisk', ord: ['fisk', 'lax', 'torsk', 'sej', 'spätta', 'pinnar', 'strömming', 'skaldjur'] },
                    { namn: 'Pasta', ord: ['pasta', 'spaghetti', 'makaroner', 'lasagne', 'fusilli', 'penne', 'tortellini'] },
                    { namn: 'Färs', ord: ['köttbullar', 'biffar', 'järpar', 'färs', 'burgare', 'palt', 'kålpudding'] },
                    { namn: 'Kyckling', ord: ['kyckling', 'kalkon', 'fågel', 'nuggets'] },
                    { namn: 'Korv', ord: ['korv', 'falukorv', 'chorizo', 'prinskorv'] },
                    { namn: 'Soppa', ord: ['soppa', 'gulasch'] }
                ];

                vardagar.forEach((dag, index) => {
                    const dateTarget = new Date(monday);
                    dateTarget.setDate(monday.getDate() + index);
                    const dateStr = getYMD(dateTarget);
                    const dayData = Array.isArray(rawMeals) ? rawMeals.find(d => String(d.date || "").includes(dateStr)) : null;
                    const minRatt = window.currentMenu[dag];

                    if (minRatt && dayData && dayData.meals) {
                        const minRattText = (minRatt.namn || "").toLowerCase();
                        
// --- UPPDATERAD LOGIK FÖR ATT SLIPPA LUNCH 2 ---
dayData.meals.forEach(m => {
    // 1. HOPPA ÖVER VEGETARISKT (Lunch 2)
    if (m.type === "Lunch 2" || m.title === "Vegetariskt") return; 

    const skolmatText = ((m.name || "") + " " + (m.description || "")).toLowerCase();
    
    // 2. Kolla ordmatchning (minst 3 tecken)
    let ärKrock = minRattText.split(' ').some(ord => ord.length > 3 && skolmatText.includes(ord));

    // 3. Kolla via KROCK_GRUPPER (Fisk, Pasta, Taco, etc.)
    if (!ärKrock) {
        KROCK_GRUPPER.forEach(grupp => {
            const minHarOrd = grupp.ord.some(o => minRattText.includes(o));
            const skolanHarOrd = grupp.ord.some(o => skolmatText.includes(o));
            if (minHarOrd && skolanHarOrd) ärKrock = true;
        });
    }

    if (ärKrock) {
        window.detectedClashes[dag] = true;
        krockCount++;
    }
});

                window.renderMenuUI();

                if (krockCount > 0) showToast(`⚠️ ${krockCount} krockar hittades!`);
                else showToast("✅ Inga krockar hittades.");

            } catch (error) {
                console.error(error);
                showToast("Kunde inte hämta skolmaten.");
            } finally {
                if(btn) { btn.innerHTML = originalText; btn.disabled = false; }
            }
        };

        window.exportDishes = () => {
            const data = JSON.stringify(dishes, null, 2);
            const blob = new Blob([data], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `backup_${currentRoom}_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        };

window.openSelectDishModal = (day) => {
            window.selectingForDay = day;
            document.getElementById('select-dish-modal').classList.remove('hidden');
            const list = document.getElementById('select-dish-list');
            
            // Sortera innan vi mappar ut HTML
            const sorted = [...dishes].sort((a, b) => {
                const nameA = a.title || a.namn || "";
                const nameB = b.title || b.namn || "";
                return nameA.localeCompare(nameB, 'sv');
            });

            list.innerHTML = sorted.map(d => `
                <div onclick="window.confirmSelectDish('${d.id}')" class="p-3 bg-gray-50 rounded-xl border flex justify-between items-center cursor-pointer hover:bg-emerald-50">
                    <span class="font-bold text-sm">${d.title || d.namn}</span>
                    <span class="text-[9px] uppercase font-bold text-gray-400">${d.kategori || 'övrigt'}</span>
                </div>
            `).join('');
        };

        window.confirmSelectDish = async (id) => {
            const winner = dishes.find(x => x.id === id);
            if(winner && window.selectingForDay) {
                window.currentMenu[window.selectingForDay] = {
                    id: winner.id,
                    namn: winner.title,
                    ingredienser: winner.ingredients,
                    kategori: winner.kategori
                };
                window.lockedDays.add(window.selectingForDay);
                await setDoc(doc(db, SETTINGS_COLLECTION, MENU_DOC), window.currentMenu);
                window.closeSelectDishModal();
            }
        };

        window.closeSelectDishModal = () => document.getElementById('select-dish-modal').classList.add('hidden');

        // --- SAKNAD IMPORT-FUNKTION ---
        window.importDishes = (input) => {
            if (!input.files[0]) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    // Hanterar både list-format [] och objekt-format { dishes: [] }
                    const rawList = Array.isArray(data) ? data : (data.dishes || data.ratter || []);
                    
                    if (rawList.length === 0) return alert("Filen verkar vara tom.");
                    
                    showToast(`Importerar ${rawList.length} recept...`);
                    
                    for (const d of rawList) {
                        // Vi mappar om fälten så de matchar din nya rums-struktur
                        await addDoc(collection(db, RECEPT_PATH), {
                            title: d.title || d.namn || "Namnlöst",
                            ingredients: Array.isArray(d.ingredients) ? d.ingredients : 
                                        (d.ingredienser ? (Array.isArray(d.ingredienser) ? d.ingredienser : d.ingredienser.split(',').map(i=>i.trim())) : []),
                            kategori: d.kategori || "övrigt",
                            createdAt: new Date().toISOString()
                        });
                    }
                    showToast("Import klar!");
                } catch (err) {
                    console.error("Importfel:", err);
                    alert("Kunde inte läsa filen. Kontrollera att det är en JSON-fil.");
                }
            };
            reader.readAsText(input.files[0]);
            input.value = ''; // Nollställ knappen
        };

        // --- SÖKFUNKTION FÖR "VÄLJ RÄTT"-MODALEN ---
        window.filterSelectModal = () => {
            const term = document.getElementById('select-modal-search').value.toLowerCase();
            const items = document.querySelectorAll('#select-dish-list > div');
            
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                // Om texten matchar sökningen visar vi den, annars döljer vi
                item.style.display = text.includes(term) ? 'flex' : 'none';
            });
        };

        // --- SÖKFUNKTION FÖR ALLA RECEPT-LISTAN ---
        window.filterDishes = () => {
            const term = document.getElementById('search-input').value.toLowerCase();
            const items = document.querySelectorAll('#all-dishes-list > div');
            
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(term) ? 'flex' : 'none';
            });
        };
    </script>
