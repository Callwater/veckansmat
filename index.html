<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#059669">
    <title>Veckomeny 2.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            padding-top: var(--safe-top);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .menu-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left-width: 6px;
        }

        .menu-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }

        @media print {
            .no-print, nav, header, #action-bar, button, .fas.fa-tag, input[type="checkbox"] { 
                display: none !important; 
            }
            body { 
                background: white !important; 
                color: black !important;
                overflow: visible !important;
                height: auto !important;
            }
            main { 
                padding: 0 !important; 
                max-width: 100% !important;
                overflow: visible !important;
            }
            #view-menu { display: block !important; }
            #menu-result { 
                display: flex !important; 
                flex-direction: column !important; 
                gap: 10px;
                margin-bottom: 50px;
            }
            .menu-card { 
                break-inside: avoid; 
                border: 1px solid #eee !important; 
                background: white !important;
                padding: 12px !important;
                border-radius: 8px !important;
                width: 100% !important;
            }
            #shopping-list-card { 
                display: block !important;
                break-before: page;
                margin-top: 0 !important;
                background: white !important;
                border: none !important;
            }
            h3 { font-size: 24px !important; margin-bottom: 15px !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">

    <header class="bg-emerald-600 text-white p-4 shadow-lg flex-none z-30 flex justify-between items-center no-print">
        <div class="flex items-center gap-2">
            <div class="bg-white/20 p-2 rounded-lg">
                <i class="fas fa-utensils text-white"></i>
            </div>
            <h1 class="text-lg font-bold tracking-tight">Veckomeny <span id="room-label" class="text-emerald-200 font-light"></span></h1>
        </div>
        <div id="connection-status" class="text-[10px] font-bold uppercase tracking-widest bg-black/10 px-3 py-1.5 rounded-full border border-white/20">
            <i class="fas fa-circle-notch fa-spin"></i> Ansluter...
        </div>
    </header>

    <nav id="tab-nav" class="bg-white border-b flex-none z-20 no-print">
        <div class="flex max-w-md mx-auto">
            <button onclick="window.app.showTab('menu')" id="tab-menu" class="flex-1 py-4 text-center text-xs font-bold uppercase tracking-wider text-emerald-600 border-b-2 border-emerald-600 transition-all">
                <i class="fas fa-home block text-lg mb-1"></i> Meny
            </button>
            <button onclick="window.app.showTab('add')" id="tab-add" class="flex-1 py-4 text-center text-xs font-bold uppercase tracking-wider text-slate-400 border-b-2 border-transparent transition-all">
                <i class="fas fa-plus block text-lg mb-1"></i> Skapa
            </button>
            <button onclick="window.app.showTab('list')" id="tab-list" class="flex-1 py-4 text-center text-xs font-bold uppercase tracking-wider text-slate-400 border-b-2 border-transparent transition-all">
                <i class="fas fa-book block text-lg mb-1"></i> Recept
            </button>
            <button onclick="window.app.showTab('settings')" id="tab-settings" class="flex-1 py-4 text-center text-xs font-bold uppercase tracking-wider text-slate-400 border-b-2 border-transparent transition-all">
                <i class="fas fa-sliders block text-lg mb-1"></i> Mer
            </button>
        </div>
    </nav>

    <main class="flex-grow overflow-y-auto w-full max-w-2xl mx-auto p-4 pb-12">
        
        <section id="view-menu" class="space-y-6">
            <div id="action-bar" class="glass-card p-5 rounded-2xl shadow-sm border border-slate-200 text-center no-print">
                <h2 class="text-sm font-semibold text-slate-500 mb-3 italic">Planera din vecka</h2>
                <div class="grid grid-cols-3 gap-3"> 
                    <button onclick="window.app.generateMenu()" class="bg-emerald-600 text-white font-bold py-3 px-2 rounded-xl shadow-md hover:bg-emerald-700 active:scale-95 transition-all text-xs">
                        <i class="fas fa-dice mr-1"></i> Slumpa
                    </button>
                    <button id="clash-btn" onclick="window.app.checkSchoolClashes()" class="bg-white text-emerald-700 border border-emerald-200 font-bold py-3 px-2 rounded-xl shadow-sm hover:bg-emerald-50 active:scale-95 transition-all text-xs">
                        <i class="fas fa-school mr-1 text-xs"></i> Skolkollen
                    </button>
                    <button onclick="window.print()" class="bg-slate-800 text-white font-bold py-3 px-2 rounded-xl shadow-md hover:bg-slate-900 active:scale-95 transition-all text-xs">
                        <i class="fas fa-print mr-1"></i> Skriv ut
                    </button>
                </div>
            </div>

            <div id="menu-result" class="space-y-4"></div>

            <div id="shopping-list-card" class="hidden bg-amber-50 border border-amber-200 rounded-2xl p-5 shadow-sm">
                <div class="flex justify-between items-center mb-4 border-b border-amber-200 pb-2">
                    <h3 class="font-bold text-amber-900"><i class="fas fa-shopping-basket mr-2"></i>Inköpslista</h3>
                    <button onclick="window.app.copyList()" class="bg-amber-200 text-amber-800 px-3 py-1 rounded-lg text-xs font-bold no-print">Kopiera</button>
                </div>
                <div id="shopping-list-content" class="space-y-4"></div>
            </div>
        </section>

        <section id="view-add" class="hidden animate-in slide-in-from-right duration-300">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="form-title" class="text-xl font-bold text-slate-800">Skapa Recept</h2>
                    <button onclick="window.app.resetForm()" class="text-slate-400 hover:text-red-500"><i class="fas fa-rotate-left"></i></button>
                </div>
                <div class="space-y-4">
                    <input type="text" id="new-name" class="w-full p-4 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all" placeholder="Rättens namn...">
                    <select id="new-category" class="w-full p-4 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none appearance-none transition-all">
                        <option value="kött">🥩 Kött</option>
                        <option value="kyckling">🍗 Kyckling</option>
                        <option value="fisk">🐟 Fisk</option>
                        <option value="vegetarisk">🥦 Vegetariskt</option>
                        <option value="chark">🌭 Korv/Chark</option>
                        <option value="helg">🥂 Lyx/Helg</option>
                    </select>
                    <textarea id="new-ingredients" class="w-full p-4 bg-slate-50 border-none rounded-xl h-32 focus:ring-2 focus:ring-emerald-500 outline-none transition-all" placeholder="Ingredienser (separera med kommatecken)..."></textarea>
                    <button id="save-btn" onclick="window.app.saveDish()" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-emerald-700 transition-all">Spara Recept</button>
                </div>
            </div>
        </section>

        <section id="view-list" class="hidden space-y-4">
            <div class="sticky top-0 z-10 bg-slate-50/80 backdrop-blur pb-2">
                <input type="text" id="search-input" onkeyup="window.app.filterDishes()" placeholder="Sök recept..." class="w-full p-4 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div id="all-dishes-list" class="grid gap-3"></div>
        </section>

        <section id="view-settings" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                <h3 class="font-bold text-slate-800">Rum & Backup</h3>
                <div class="p-3 bg-emerald-50 rounded-xl border border-emerald-100 flex items-center justify-between">
                    <span class="text-xs font-semibold text-emerald-800 uppercase tracking-tighter">Aktivt Rum</span>
                    <span id="room-id-val" class="text-sm font-bold text-emerald-600">Standard</span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="window.app.exportJSON()" class="p-3 bg-slate-100 text-slate-700 rounded-xl text-xs font-bold hover:bg-slate-200 transition-all">Exportera</button>
                    <button onclick="document.getElementById('import-file').click()" class="p-3 bg-slate-100 text-slate-700 rounded-xl text-xs font-bold hover:bg-slate-200 transition-all">Importera</button>
                </div>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="window.app.importJSON(this)">
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                <h3 class="font-bold text-slate-800">Mina Butikskategorier</h3>
                <div class="flex gap-2">
                    <input type="text" id="new-custom-cat" class="flex-grow p-3 bg-slate-50 border-none rounded-xl text-sm outline-none" placeholder="T.ex. Husdjur">
                    <button onclick="window.app.addCategory()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold">Lägg till</button>
                </div>
                <div id="custom-categories-list" class="flex flex-wrap gap-2"></div>
            </div>
        </section>

        <div id="category-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 no-print">
            <div class="bg-white rounded-3xl w-full max-w-xs p-6 shadow-2xl animate-in zoom-in duration-200">
                <h3 class="text-lg font-bold text-slate-800 mb-1">Ändra kategori</h3>
                <p class="text-xs text-slate-400 mb-6">Sortera <span id="cat-edit-item-name" class="font-bold text-emerald-600"></span>.</p>
                <select id="cat-edit-select" class="w-full p-4 bg-slate-50 border-none rounded-2xl mb-6 outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-emerald-500 transition-all"></select>
                <div class="flex gap-3">
                    <button onclick="document.getElementById('category-modal').classList.add('hidden')" class="flex-1 py-3 text-sm font-bold text-slate-400">Avbryt</button>
                    <button onclick="window.app.saveCategoryChange()" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold">Spara</button>
                </div>
            </div>
        </div>

    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-900 text-white rounded-full text-sm font-medium shadow-2xl opacity-0 translate-y-4 transition-all duration-300 pointer-events-none z-50"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4tVwDuLbDIRTt6O9gnghpJRBOXjD6fI0",
            authDomain: "veckansmat-3ed6b.firebaseapp.com",
            projectId: "veckansmat-3ed6b",
            storageBucket: "veckansmat-3ed6b.firebasestorage.app",
            messagingSenderId: "199515297394",
            appId: "1:199515297394:web:d071866da9add8338954eb"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);

        const state = {
            dishes: [],
            currentMenu: {},
            lockedDays: new Set(),
            clashes: {},
            room: new URLSearchParams(window.location.search).get('rum') || 'standard',
            editingId: null,
            itemToEdit: null,
            customCategories: {},
            availableCategories: [],
            basvaror: new Set(['salt', 'peppar', 'smör', 'olja', 'mjöl', 'socker', 'buljong', 'soja', 'ketchup', 'senap'])
        };

        const PATHS = {
            dishes: `rum/${state.room}/recept`,
            menu: `rum/${state.room}/inställningar/aktuell_meny`
        };

        window.app = {
            showTab(tab) {
                ['menu', 'add', 'list', 'settings'].forEach(t => {
                    document.getElementById(`view-${t}`).classList.add('hidden');
                    document.getElementById(`tab-${t}`).classList.remove('text-emerald-600', 'border-emerald-600', 'bg-emerald-50');
                    document.getElementById(`tab-${t}`).classList.add('text-slate-400');
                });
                document.getElementById(`view-${tab}`).classList.remove('hidden');
                document.getElementById(`tab-${tab}`).classList.add('text-emerald-600', 'border-emerald-600', 'bg-emerald-50');
            },

            async addCategory() {
                const input = document.getElementById('new-custom-cat');
                const name = input.value.trim();
                if(!name) return;
                if(!state.availableCategories) state.availableCategories = [];
                state.availableCategories.push(name);
                await setDoc(doc(db, "globala_inställningar", "inställningar"), { categories: state.availableCategories });
                input.value = '';
                this.notify("Kategori tillagd!");
            },

            async removeCategory(name) {
                if(confirm(`Ta bort "${name}"?`)) {
                    state.availableCategories = (state.availableCategories || []).filter(c => c !== name);
                    await setDoc(doc(db, "globala_inställningar", "inställningar"), { categories: state.availableCategories });
                }
            },

            renderSettingsCategories() {
                const container = document.getElementById('custom-categories-list');
                if(!container) return;
                container.innerHTML = (state.availableCategories || []).map(cat => `
                    <div class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2">
                        ${cat} <button onclick="window.app.removeCategory('${cat}')" class="text-slate-400 hover:text-red-500"><i class="fas fa-times"></i></button>
                    </div>`).join('');
            },

            openCategoryModal(itemName) {
                state.itemToEdit = itemName.toLowerCase();
                const modal = document.getElementById('category-modal');
                const select = document.getElementById('cat-edit-select');
                document.getElementById('cat-edit-item-name').innerText = itemName;
                
                const defaultCats = ['Frukt & Grönt', 'Mejeri', 'Kött/Fisk', 'Chark', 'Skafferi', 'Fryst', 'Dryck', 'Basvaror', 'Övrigt'];
                const allPossibleCats = [...new Set([...defaultCats, ...(state.availableCategories || [])])];
                const currentCat = state.basvaror.has(state.itemToEdit) ? 'Basvaror' : (state.customCategories[state.itemToEdit] || 'Övrigt');

                select.innerHTML = allPossibleCats.sort().map(cat => `<option value="${cat}" ${cat === currentCat ? 'selected' : ''}>${cat}</option>`).join('');
                modal.classList.remove('hidden');
            },

            async saveCategoryChange() {
                const newCat = document.getElementById('cat-edit-select').value;
                const item = state.itemToEdit;
                try {
                    if(newCat === 'Basvaror') {
                        state.basvaror.add(item);
                        await setDoc(doc(db, "globala_inställningar", "basvaror"), { items: Array.from(state.basvaror) });
                    } else {
                        state.customCategories[item] = newCat;
                        await setDoc(doc(db, "globala_inställningar", "kategorier"), { map: state.customCategories });
                        if(state.basvaror.has(item)) {
                            state.basvaror.delete(item);
                            await setDoc(doc(db, "globala_inställningar", "basvaror"), { items: Array.from(state.basvaror) });
                        }
                    }
                    this.notify("Sparat!");
                    document.getElementById('category-modal').classList.add('hidden');
                } catch(e) { this.notify("Fel vid sparning."); }
            },

            async saveDish() {
                const name = document.getElementById('new-name').value.trim();
                const cat = document.getElementById('new-category').value;
                const ingStr = document.getElementById('new-ingredients').value.trim();
                if(!name || !ingStr) return this.notify("Fyll i allt.");
                const dishData = { namn: name, kategori: cat, ingredienser: ingStr.split(',').map(i => i.trim()).filter(i => i) };
                try {
                    if(state.editingId) await updateDoc(doc(db, PATHS.dishes, state.editingId), dishData);
                    else await addDoc(collection(db, PATHS.dishes), dishData);
                    this.notify("Sparat!");
                    this.resetForm();
                } catch(e) { console.error(e); }
            },

            async deleteDish(id) {
                if(confirm("Radera receptet?")) {
                    await deleteDoc(doc(db, PATHS.dishes, id));
                    this.notify("Raderat.");
                }
            },

            editDish(id) {
                const dish = state.dishes.find(d => d.id === id);
                if(!dish) return;
                state.editingId = id;
                document.getElementById('new-name').value = dish.namn;
                document.getElementById('new-category').value = dish.kategori;
                document.getElementById('new-ingredients').value = dish.ingredienser.join(', ');
                document.getElementById('form-title').innerText = "Redigera Recept";
                this.showTab('add');
            },

            resetForm() {
                state.editingId = null;
                document.getElementById('new-name').value = '';
                document.getElementById('new-ingredients').value = '';
                document.getElementById('form-title').innerText = "Skapa Recept";
            },

            async importJSON(input) {
                if (!input.files[0]) return;
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        const rawList = Array.isArray(data) ? data : (data.dishes || []);
                        for (const d of rawList) {
                            await addDoc(collection(db, PATHS.dishes), {
                                namn: d.namn || d.title,
                                ingredienser: Array.isArray(d.ingredienser) ? d.ingredienser : d.ingredients,
                                kategori: d.kategori || "övrigt"
                            });
                        }
                        this.notify("Import klar!");
                    } catch (err) { this.notify("Fel vid import."); }
                };
                reader.readAsText(input.files[0]);
            },

            exportJSON() {
                const cleanData = state.dishes.map(({id, ...rest}) => rest);
                const blob = new Blob([JSON.stringify(cleanData, null, 2)], { type: "application/json" });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `backup_${state.room}.json`;
                a.click();
            },

            // Generera Matsedel

async generateMenu() {
                const days = ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag', 'Söndag'];
                const helgDays = ['Fredag', 'Lördag'];
                const vardagar = ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Söndag'];
                
                if(state.dishes.length < 7) return this.notify("Du behöver minst 7 recept!");

                // --- STEG 1: Rensa allt som inte är låst ---
                const newMenu = {};
                let usedIds = new Set();

                days.forEach(day => {
                    if (state.lockedDays.has(day) && state.currentMenu[day]) {
                        newMenu[day] = state.currentMenu[day];
                        usedIds.add(state.currentMenu[day].id);
                    } else {
                        newMenu[day] = null; // Töm dagen helt!
                    }
                });

                // --- STEG 2: Hjälpfunktion för att hitta färsk mat ---
                const getFreshPool = (cat = null) => {
                    return state.dishes.filter(d => {
                        const matchCat = cat ? d.kategori === cat : true;
                        return matchCat && !usedIds.has(d.id);
                    }).sort(() => 0.5 - Math.random());
                };

                // --- STEG 3: FISK (En gång i veckan) ---
                const hasLockedFish = Array.from(usedIds).some(id => 
                    state.dishes.find(d => d.id === id)?.kategori === 'fisk'
                );
                
                if (!hasLockedFish) {
                    const fishPool = getFreshPool('fisk');
                    const availableFishDays = vardagar.filter(d => !state.lockedDays.has(d));
                    if (fishPool.length > 0 && availableFishDays.length > 0) {
                        const day = availableFishDays[0];
                        const pick = fishPool[0];
                        newMenu[day] = pick;
                        usedIds.add(pick.id);
                    }
                }

                // --- STEG 4: HELG (Fredag & Lördag) ---
                helgDays.forEach(day => {
                    if (!state.lockedDays.has(day)) {
                        const helgPool = getFreshPool('helg');
                        const fallbackPool = getFreshPool();
                        const pick = helgPool[0] || fallbackPool[0];
                        if (pick) {
                            newMenu[day] = pick;
                            usedIds.add(pick.id);
                        }
                    }
                });

                // --- STEG 5: RESTEN (Fyll de tomma luckorna) ---
                days.forEach(day => {
                    if (newMenu[day]) return; // Hoppa över om redan fylld (låst/fisk/helg)

                    let pool = getFreshPool();
                    
                    // Försök variera kategori mot föregående dag
                    const prevDay = days[days.indexOf(day) - 1];
                    const prevCat = newMenu[prevDay]?.kategori;
                    if (pool.length > 1 && pool[0].kategori === prevCat) {
                        const item = pool.shift();
                        pool.push(item);
                    }

                    const pick = pool[0];
                    if (pick) {
                        newMenu[day] = pick;
                        usedIds.add(pick.id);
                    }
                });

                // --- STEG 6: Spara och bekräfta ---
                state.currentMenu = newMenu;
                await setDoc(doc(db, PATHS.menu), newMenu);
                this.renderMenu();
                this.notify("Smart meny med 7 unika rätter klar!");
                
                console.log("Valda unika ID:n för veckan (" + usedIds.size + " st):", Array.from(usedIds));
            },


            // Krock koll med lunch på skolan
async checkSchoolClashes() {
                const btn = document.getElementById('clash-btn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Synkar...';
                
                try {
                    const today = new Date();
                    const dayOfWeek = today.getDay(); 
                    const diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
                    const monday = new Date(today);
                    monday.setDate(today.getDate() + diffToMonday);

                    const weekDates = {};
                    ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag'].forEach((name, i) => {
                        const d = new Date(monday);
                        d.setDate(monday.getDate() + i);
                        weekDates[name] = d.toISOString().split('T')[0];
                    });

                    const apiUrl = `https://meny-api.mateo.se/api/v1/days/565?from=${weekDates['Måndag']}&to=${weekDates['Fredag']}`;
                    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(apiUrl)}`);
                    const data = await res.json();
                    const schoolDays = Array.isArray(data) ? data : (data.data || []);

                    state.clashes = {};

                    // --- KATEGORIKARTAN (Här bor intelligensen) ---
                    const categories = {
                        fisk: ['sej', 'torsk', 'lax', 'spätta', 'fisk', 'strömming', 'kolja', 'hoki', 'fiskpinnar'],
                        pasta: ['pasta', 'makaroner', 'spaghetti', 'fusilli', 'penne', 'lasagne', 'tagliatelle', 'gnocchi', 'carbonara', 'bolognese'],
                        färs: ['färs', 'köttfärs', 'köttbullar', 'biffar', 'pannbiff', 'järpar', 'kebab', 'hamburgare'],
                        korv: ['korv', 'falukorv', 'prinskorv', 'chorizo', 'bratwurst', 'istroband', 'isterband'],
                        kyckling: ['kyckling', 'chicken', 'nuggets', 'filé'],
                        pannkaka: ['pannkaka', 'pannkakor', 'plättar', 'ugnspannkaka', 'raggmunkar', 'crepes'],
                        soppa: ['soppa', 'gulasch', 'minestrone', 'buljong']
                    };

                    const ignoredWords = [
                        'potatis', 'potatismos', 'ris', 'bulgur', 'couscous', 'stuvad', 'stuvade', 
                        'kokt', 'kokta', 'stekt', 'stekta', 'ugnsbakad', 'med', 'till', 'sås'
                    ];

                    ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag'].forEach(dayName => {
                        const targetDate = weekDates[dayName];
                        const schoolDay = schoolDays.find(d => d.date && d.date.includes(targetDate));
                        if (!schoolDay || !schoolDay.meals) return;

                        const homeDish = state.currentMenu[dayName];
                        if (!homeDish) return;

                        const hName = homeDish.namn.toLowerCase();
                        const sMeal = schoolDay.meals.find(m => m.type === "Lunch 1");
                        if (!sMeal) return;
                        const sName = sMeal.name.toLowerCase();

                        let isClash = false;

                        // 1. Kolla kategorikrockar (Smart matchning)
                        for (const [cat, words] of Object.entries(categories)) {
                            const homeHasCat = words.some(w => hName.includes(w));
                            const schoolHasCat = words.some(w => sName.includes(w));
                            
                            if (homeHasCat && schoolHasCat) {
                                console.log(`Kategori-krock på ${dayName}: Båda är ${cat}`);
                                isClash = true;
                                break;
                            }
                        }

                        // 2. Kolla ord-krockar (för rätter utanför kategorierna, ex "Tacos")
                        if (!isClash) {
                            const hKeywords = hName.replace(/[^a-zåäö ]/g, " ").split(" ")
                                .filter(w => w.length > 3 && !ignoredWords.includes(w));
                            
                            if (hKeywords.some(word => sName.includes(word))) {
                                isClash = true;
                            }
                        }

                        if (isClash) {
                            state.clashes[dayName] = sMeal.name;
                        }
                    });

                    this.renderMenu();
                    const count = Object.keys(state.clashes).length;
                    this.notify(count > 0 ? `${count} krockar hittade!` : "Inga krockar hittades.");
                    
                } catch(e) { 
                    this.notify("Kunde inte hämta skolmaten."); 
                } finally { 
                    btn.innerHTML = '<i class="fas fa-school mr-1 text-xs"></i> Skolkollen'; 
                }
            },

            //Skapa Meny 
            renderMenu() {
                const container = document.getElementById('menu-result');
                if(!container) return;
                container.innerHTML = '';
                ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag', 'Söndag'].forEach(day => {
                    const dish = state.currentMenu[day];
                    const locked = state.lockedDays.has(day);
                    const clash = state.clashes[day];
                    container.innerHTML += `
                        <div class="menu-card glass-card p-4 rounded-2xl shadow-sm relative ${locked ? 'border-amber-400 bg-amber-50/50' : 'border-emerald-500'}">
                            ${clash ? `<div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-red-600 text-white text-[9px] px-3 py-1 rounded-full font-black shadow-lg animate-pulse z-10">SKOLKROCK: ${clash}</div>` : ''}
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">${day}</span>
                                <div class="flex gap-4 no-print">
                                    <button onclick="window.app.toggleLock('${day}')" class="${locked ? 'text-amber-500' : 'text-slate-200'} transition-colors"><i class="fas fa-lock"></i></button>
                                    <button onclick="window.app.editDish('${dish?.id}')" class="text-slate-200 hover:text-blue-500"><i class="fas fa-pen text-xs"></i></button>
                                </div>
                            </div>
                            <h3 class="font-bold text-slate-800 text-lg">${dish ? dish.namn : '<span class="text-slate-300 italic">Inget valt...</span>'}</h3>
                            <p class="text-xs text-slate-500 mt-1 truncate">${dish ? (dish.ingredienser || []).join(', ') : ''}</p>
                        </div>`;
                });
                this.generateShoppingList();
            },

            renderDishList() {
                const container = document.getElementById('all-dishes-list');
                if(!container) return;
                container.innerHTML = [...state.dishes].sort((a,b) => a.namn.localeCompare(b.namn)).map(d => `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div class="overflow-hidden">
                            <h4 class="font-bold text-slate-800 text-sm">${d.namn}</h4>
                            <p class="text-[10px] text-slate-400 truncate">${(d.ingredienser || []).join(', ')}</p>
                        </div>
                        <div class="flex gap-4 ml-4">
                            <button onclick="window.app.editDish('${d.id}')" class="text-slate-300 hover:text-emerald-500"><i class="fas fa-pen"></i></button>
                            <button onclick="window.app.deleteDish('${d.id}')" class="text-slate-300 hover:text-red-400"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`).join('');
            },

            generateShoppingList() {
                const container = document.getElementById('shopping-list-content');
                const card = document.getElementById('shopping-list-card');
                let all = [];
                Object.values(state.currentMenu).forEach(d => { if(d?.ingredienser) all = [...all, ...d.ingredienser]; });
                if(all.length === 0) { if(card) card.classList.add('hidden'); return; }
                if(card) card.classList.remove('hidden');

                const cats = { 'Frukt & Grönt': [], 'Mejeri': [], 'Kött/Fisk': [], 'Chark': [], 'Skafferi': [], 'Fryst': [], 'Dryck': [] };
                (state.availableCategories || []).forEach(c => cats[c] = []);
                cats['Basvaror'] = []; cats['Övrigt'] = [];

                const keywords = { 
                    'Frukt & Grönt': ['tomat','gurka','lök','sallad','kål','morot','paprika','citron'], 
                    'Mejeri': ['mjölk','ost','ägg','smör','grädde','fraiche','yoghurt'], 
                    'Kött/Fisk': ['lax','färs','kyckling','bacon','skinka','biff','torsk'] 
                };

                const uniqueIngs = [...new Set(all.map(i => i.toLowerCase().trim()))];
                uniqueIngs.forEach(ing => {
                    let userCat = state.customCategories[ing];
                    if (userCat === 'Grönt' || userCat === 'Frukt och Grönt') userCat = 'Frukt & Grönt';

                    if(state.basvaror.has(ing)) { cats['Basvaror'].push(ing); return; }
                    if(userCat && cats[userCat]) { cats[userCat].push(ing); return; }

                    let foundByKeyword = false;
                    for(const [categoryName, keys] of Object.entries(keywords)) { 
                        if(keys.some(key => ing.includes(key))) { cats[categoryName].push(ing); foundByKeyword = true; break; } 
                    }
                    if(!foundByKeyword) cats['Övrigt'].push(ing);
                });

                if(container) container.innerHTML = Object.entries(cats).map(([c, items]) => {
                    if(items.length === 0) return '';
                    const isBasvara = c === 'Basvaror';
                    return `
                        <div class="${isBasvara ? 'mt-6 pt-4 border-t border-amber-200 opacity-60' : 'mt-2'}">
                            <h4 class="text-[10px] font-black uppercase tracking-tighter mb-2 text-amber-800/50">${c}</h4>
                            <ul class="space-y-2">
                                ${items.map(i => `
                                    <li class="flex justify-between group py-1 border-b border-slate-100 print:border-slate-200">
                                        <div class="flex items-center gap-3">
                                            <input type="checkbox" class="w-5 h-5 rounded border-amber-300 text-emerald-600 no-print">
                                            <span class="hidden print:inline text-slate-400 mr-2">•</span>
                                            <span class="text-sm text-amber-900 capitalize font-medium">${i}</span>
                                        </div>
                                        <button onclick="window.app.openCategoryModal('${i.replace(/'/g, "\\'")}')" class="text-amber-400 hover:text-emerald-600 p-1 no-print">
                                            <i class="fas fa-tag text-[10px]"></i>
                                        </button>
                                    </li>`).join('')}
                            </ul>
                        </div>`;
                }).join('');
            },

            notify(msg) {
                const t = document.getElementById('toast');
                if(!t) return;
                t.innerText = msg; t.classList.remove('opacity-0');
                setTimeout(() => t.classList.add('opacity-0'), 2500);
            },

            filterDishes() {
                const t = document.getElementById('search-input').value.toLowerCase();
                document.querySelectorAll('#all-dishes-list > div').forEach(i => i.style.display = i.innerText.toLowerCase().includes(t) ? 'flex' : 'none');
            },

            copyList() {
                const items = Array.from(document.querySelectorAll('#shopping-list-content span:not(.print\\:inline)')).map(s => s.innerText);
                navigator.clipboard.writeText("INKÖPSLISTA:\n" + items.join("\n"));
                this.notify("Kopierad!");
            }
        };

        // --- STARTA UP ---
        document.getElementById('room-id-val').innerText = state.room;
        document.getElementById('room-label').innerText = `| ${state.room}`;

        onSnapshot(collection(db, PATHS.dishes), snap => {
            state.dishes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            document.getElementById('connection-status').innerHTML = '<i class="fas fa-check-circle text-emerald-300"></i> Online';
            window.app.renderDishList();
            window.app.renderMenu();
        }, () => { document.getElementById('connection-status').innerText = 'Offline/Fel'; });

        onSnapshot(doc(db, PATHS.menu), snap => { if(snap.exists()) { state.currentMenu = snap.data(); window.app.renderMenu(); } });
        onSnapshot(doc(db, "globala_inställningar", "kategorier"), snap => { if(snap.exists()) { state.customCategories = snap.data()?.map || {}; window.app.renderMenu(); } });
        onSnapshot(doc(db, "globala_inställningar", "basvaror"), snap => { if(snap.exists() && snap.data().items) { state.basvaror = new Set(snap.data().items.map(i => i.toLowerCase())); window.app.renderMenu(); } });
        onSnapshot(doc(db, "globala_inställningar", "inställningar"), snap => { if(snap.exists()) { state.availableCategories = snap.data().categories || []; window.app.renderSettingsCategories(); window.app.renderMenu(); } });

        window.app.showTab('menu');
    </script>
</body>
</html>
